openapi: 3.0.1
info:
  title: Article
  description: Example workspace
  version: 1.0.0
paths:
  /articles:
    get:
      summary: Search for articles
      parameters:
        - name: text
          in: query
          required: false
          schema:
            type: string
        - name: views
          in: query
          required: false
          schema:
            type: integer
        - name: reading-minutes
          in: query
          required: false
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum:
              - views
              - reading-minutes
        - name: direction
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          description:
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SummarizedArticle'
                  metadata:
                    $ref: '#/components/schemas/SearchResultMetadata'
                required:
                  - data
                  - metadata
          headers: {}
        '500':
          $ref: '#/components/responses/default'
          description:
    post:
      summary: Create article
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreationAndModification'
        required: true
      responses:
        '201':
          description:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteArticle'
          headers: {}
        '400':
          $ref: '#/components/responses/default'
          description:
        '401':
          $ref: '#/components/responses/default'
          description:
        '403':
          $ref: '#/components/responses/default'
          description:
        '500':
          $ref: '#/components/responses/default'
          description:
  /articles/{id}:
    get:
      summary: Get a specific article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteArticle'
          headers: {}
        '404':
          $ref: '#/components/responses/default'
          description:
        '500':
          $ref: '#/components/responses/default'
          description:
    patch:
      summary: Edit article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreationAndModification'
        required: true
      responses:
        '200':
          description:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleCreationAndModification'
          headers: {}
        '400':
          $ref: '#/components/responses/default'
          description:
        '401':
          $ref: '#/components/responses/default'
          description:
        '403':
          $ref: '#/components/responses/default'
          description:
        '404':
          $ref: '#/components/responses/default'
          description:
        '500':
          $ref: '#/components/responses/default'
          description:
    delete:
      summary: Remove article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: >-
            The request was successful, but there is no content to return in the
            response.
          headers: {}
        '400':
          $ref: '#/components/responses/default'
          description:
        '401':
          $ref: '#/components/responses/default'
          description:
        '403':
          $ref: '#/components/responses/default'
          description:
        '500':
          $ref: '#/components/responses/default'
          description:
  /articles/{id}/enrich:
    post:
      summary: Enrich article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - completeHtml
              properties:
                completeHtml:
                  type: string
        required: true
      responses:
        '204':
          description: >-
            The request was successful, but there is no content to return in the
            response.
          headers: {}
        '400':
          $ref: '#/components/responses/default'
          description:
        '401':
          $ref: '#/components/responses/default'
          description:
        '403':
          $ref: '#/components/responses/default'
          description:
        '404':
          $ref: '#/components/responses/default'
          description:
        '500':
          $ref: '#/components/responses/default'
          description:
  /articles/{id}/reports:
    post:
      summary: Report article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCreation'
        required: true
      responses:
        '204':
          description: >-
            The request was successful, but there is no content to return in the
            response.
          headers: {}
        '400':
          $ref: '#/components/responses/default'
          description:
        '401':
          $ref: '#/components/responses/default'
          description:
        '403':
          $ref: '#/components/responses/default'
          description:
        '404':
          $ref: '#/components/responses/default'
          description:
        '500':
          $ref: '#/components/responses/default'
          description:
components:
  schemas:
    CompleteArticle:
      type: object
      required:
        - id
        - title
        - introduction
        - coverImageId
      properties:
        id:
          type: string
        title:
          type: string
        introduction:
          type: string
        coverImageId:
          type: string
        cleanHtml:
          type: string
      description: A complete model for article
    ArticleCreationAndModification:
      type: object
      required:
        - title
        - introduction
        - coverImageId
      properties:
        title:
          type: string
        introduction:
          type: string
        coverImageId:
          type: string
      description: ''
    SummarizedArticle:
      type: object
      required:
        - title
        - id
        - views
        - uploadedAt
        - tags
      properties:
        id:
          type: string
        title:
          type: string
        views:
          type: integer
        uploadedAt:
          type: string
        tags:
          type: array
          items:
            type: string
      description: A summarized model for article
    ReportCreation:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
      description: ''
    SearchResultMetadata:
      type: object
      required:
        - filters
        - pagination
        - sort
      properties:
        filters:
          type: array
          items:
            type: object
            required:
              - any
              - name
            properties:
              name:
                type: string
              any:
                type: object
                properties: {}
        sort:
          type: array
          items:
            type: object
            required:
              - direction
              - name
            properties:
              name:
                type: string
              direction:
                type: string
        pagination:
          type: object
          required:
            - elements
            - last
            - page
            - size
          properties:
            page:
              type: integer
            size:
              type: integer
            last:
              type: integer
            elements:
              type: integer
      description: ''
  responses:
    default:
      description:
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
            required:
              - message